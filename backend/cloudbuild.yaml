steps:
  - name: 'gcr.io/cloud-builders/docker'
    dir: backend
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID', '.']

  - name: 'gcr.io/cloud-builders/docker'
    dir: backend
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    dir: backend
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=bhmcontrol:europe-west1:bhmdb'
      - '--set-secrets=DATABASE_URL=bhm-prod-DATABASE_URL:latest,JWT_SECRET=bhm-prod-JWT_SECRET:latest'
      - '--timeout=300'

substitutions:
  _SERVICE: bhm-api
  _REGION: europe-west1

options:
  logging: CLOUD_LOGGING_ONLY
